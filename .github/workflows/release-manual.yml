name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish:
        description: Publish GitHub Release and push new tag
        required: true
        default: true
        type: boolean
      run_tests:
        description: Run unit tests before publishing
        required: true
        default: false
        type: boolean

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.11"

      - name: Derive next version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest}" ]]; then
            latest="v0.0.0"
          fi

          if [[ ! "${latest}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '${latest}' is not semver (expected vX.Y.Z)." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ inputs.bump }}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "Tag ${next} already exists." >&2
            exit 1
          fi

          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "Computed next tag: ${next}"

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Build macOS onefile binary
        run: ./scripts/build_macos_onefile.sh

      - name: Build macOS onedir bundle (fast startup)
        run: ./scripts/build_macos_onedir.sh

      - name: Package onedir bundle for Homebrew
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist -czf dist/razecli-onedir-macos-arm64.tar.gz razecli-onedir

      - name: Create SHA256 checksums
        shell: bash
        run: |
          shasum -a 256 dist/razecli > dist/razecli.sha256
          shasum -a 256 dist/razecli-onedir-macos-arm64.tar.gz > dist/razecli-onedir-macos-arm64.tar.gz.sha256
          cat dist/razecli.sha256
          cat dist/razecli-onedir-macos-arm64.tar.gz.sha256

      - name: Generate Homebrew formula artifact
        shell: bash
        run: |
          set -euo pipefail
          onedir_sha="$(awk '{print $1}' dist/razecli-onedir-macos-arm64.tar.gz.sha256)"
          .venv/bin/python scripts/generate_homebrew_formula.py \
            --repository "${{ github.repository }}" \
            --tag "${{ steps.version.outputs.next }}" \
            --asset-name "razecli-onedir-macos-arm64.tar.gz" \
            --asset-sha256 "${onedir_sha}" \
            --out "dist/razecli.rb"
          cat dist/razecli.rb

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: .venv/bin/python -m unittest discover -s tests -q

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: razecli-macos-${{ steps.version.outputs.next }}
          path: |
            dist/razecli
            dist/razecli.sha256
            dist/razecli-onedir-macos-arm64.tar.gz
            dist/razecli-onedir-macos-arm64.tar.gz.sha256
            dist/razecli.rb
          if-no-files-found: error
          retention-days: 7

      - name: Create and push tag
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: ${{ steps.version.outputs.next }}
          files: |
            dist/razecli
            dist/razecli.sha256
            dist/razecli-onedir-macos-arm64.tar.gz
            dist/razecli-onedir-macos-arm64.tar.gz.sha256
            dist/razecli.rb
          body: |
            Automated manual release build.

            Previous tag: ${{ steps.version.outputs.latest }}
            Bump: ${{ inputs.bump }}
            Homebrew formula asset: razecli.rb
