name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release (optional, for example v0.0.4). If set, no new tag is created.
        required: false
        default: ""
        type: string
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish:
        description: Publish GitHub Release and push new tag
        required: true
        default: true
        type: boolean
      run_tests:
        description: Run unit tests before publishing
        required: true
        default: false
        type: boolean

concurrency:
  group: manual-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  derive-version:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.version.outputs.latest }}
      next: ${{ steps.version.outputs.next }}
      mode: ${{ steps.version.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Derive next version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          input_tag="${{ inputs.tag }}"
          if [[ -n "${input_tag}" ]]; then
            if [[ ! "${input_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Input tag '${input_tag}' is not semver (expected vX.Y.Z)." >&2
              exit 1
            fi
            if ! git rev-parse -q --verify "refs/tags/${input_tag}" >/dev/null; then
              echo "Input tag '${input_tag}' does not exist in repository tags." >&2
              echo "Create and push it first from your local machine, then rerun workflow with tag='${input_tag}'." >&2
              exit 1
            fi
            echo "latest=${input_tag}" >> "$GITHUB_OUTPUT"
            echo "next=${input_tag}" >> "$GITHUB_OUTPUT"
            echo "mode=existing" >> "$GITHUB_OUTPUT"
            echo "Using existing tag: ${input_tag}"
            exit 0
          fi

          latest="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest}" ]]; then
            latest="v0.0.0"
          fi

          if [[ ! "${latest}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '${latest}' is not semver (expected vX.Y.Z)." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ inputs.bump }}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "Tag ${next} already exists." >&2
            exit 1
          fi

          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "mode=new" >> "$GITHUB_OUTPUT"
          echo "Computed next tag: ${next}"

  build-macos:
    needs: derive-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.9"

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Show build Python versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          .venv/bin/python --version

      - name: Build macOS onefile binary
        run: ./scripts/build_macos_onefile.sh

      - name: Build macOS onedir bundle (fast startup)
        run: ./scripts/build_macos_onedir.sh

      - name: Smoke-check BLE module in packaged binaries
        shell: bash
        run: |
          set -euo pipefail

          check_ble_bundle() {
            local bin="$1"
            local out
            local code
            set +e
            out="$("${bin}" --json ble scan --timeout 0.2 2>&1)"
            code=$?
            set -e

            if grep -qi "BLE probe requires bleak" <<<"${out}"; then
              echo "${out}"
              echo "Packaged binary is missing bleak dependency: ${bin}" >&2
              exit 1
            fi

            echo "BLE import check passed for ${bin} (exit code ${code})."
          }

          check_corebluetooth_bundle() {
            local bin="$1"
            local out
            local code
            set +e
            out="$("${bin}" --json ble alias resolve --address 00:11:22:33:44:55 --timeout 0.3 2>&1)"
            code=$?
            set -e

            if grep -Eqi "No module named '?(CoreBluetooth|Foundation|objc|libdispatch|bleak\\.backends\\.corebluetooth)" <<<"${out}"; then
              echo "${out}"
              echo "Packaged binary is missing macOS BLE CoreBluetooth runtime modules: ${bin}" >&2
              exit 1
            fi

            echo "CoreBluetooth import check passed for ${bin} (exit code ${code})."
          }

          check_ble_bundle ./dist/razecli
          check_ble_bundle ./dist/razecli-onedir/razecli-onedir
          check_corebluetooth_bundle ./dist/razecli
          check_corebluetooth_bundle ./dist/razecli-onedir/razecli-onedir

      - name: Rename and package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mv dist/razecli "dist/razecli-macos-${{ matrix.arch }}"
          tar -C dist -czf "dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz" razecli-onedir

      - name: Create SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 "dist/razecli-macos-${{ matrix.arch }}" > "dist/razecli-macos-${{ matrix.arch }}.sha256"
          shasum -a 256 "dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz" > "dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz.sha256"
          cat "dist/razecli-macos-${{ matrix.arch }}.sha256"
          cat "dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz.sha256"

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: .venv/bin/python -m unittest discover -s tests -q

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: razecli-macos-${{ matrix.arch }}-${{ needs.derive-version.outputs.next }}
          path: |
            dist/razecli-macos-${{ matrix.arch }}
            dist/razecli-macos-${{ matrix.arch }}.sha256
            dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz
            dist/razecli-onedir-macos-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs:
      - derive-version
      - build-macos
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.11"

      - name: Download arm64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: razecli-macos-arm64-${{ needs.derive-version.outputs.next }}
          path: dist/arm64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: razecli-macos-x86_64-${{ needs.derive-version.outputs.next }}
          path: dist/x86_64

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          cp dist/arm64/* dist/
          cp dist/x86_64/* dist/
          ls -la dist

      - name: Generate Homebrew formula file (optional tap usage)
        shell: bash
        run: |
          set -euo pipefail
          arm_sha="$(awk '{print $1}' dist/razecli-onedir-macos-arm64.tar.gz.sha256)"
          x86_sha="$(awk '{print $1}' dist/razecli-onedir-macos-x86_64.tar.gz.sha256)"
          python scripts/generate_homebrew_formula.py \
            --repository "${{ github.repository }}" \
            --tag "${{ needs.derive-version.outputs.next }}" \
            --asset-name-arm64 "razecli-onedir-macos-arm64.tar.gz" \
            --asset-sha256-arm64 "${arm_sha}" \
            --asset-name-x86-64 "razecli-onedir-macos-x86_64.tar.gz" \
            --asset-sha256-x86-64 "${x86_sha}" \
            --out "dist/razecli.rb"
          cat dist/razecli.rb

      - name: Create and push tag
        if: ${{ needs.derive-version.outputs.mode == 'new' }}
        shell: bash
        env:
          PUSH_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.derive-version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}
          tag_name: ${{ needs.derive-version.outputs.next }}
          name: ${{ needs.derive-version.outputs.next }}
          files: |
            dist/razecli-macos-arm64
            dist/razecli-macos-arm64.sha256
            dist/razecli-onedir-macos-arm64.tar.gz
            dist/razecli-onedir-macos-arm64.tar.gz.sha256
            dist/razecli-macos-x86_64
            dist/razecli-macos-x86_64.sha256
            dist/razecli-onedir-macos-x86_64.tar.gz
            dist/razecli-onedir-macos-x86_64.tar.gz.sha256
            dist/razecli.rb
          body: |
            Automated manual release build.

            Previous tag: ${{ needs.derive-version.outputs.latest }}
            Bump: ${{ inputs.bump }}
            Included binaries:
            - macOS arm64
            - macOS x86_64
